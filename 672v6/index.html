<style>
html, body {
  margin: 0;
  min-height: 100%;
  background: #101827;
  color: #f5f7fb;
  font-family: Arial, Helvetica, sans-serif;
}
body {
  background: linear-gradient(135deg, #101827 0%, #17385f 48%, #0b101a 100%);
}
.shell {
  max-width: 980px;
  margin: 0 auto;
  padding: 24px 18px 36px;
}
.hero {
  padding: 22px 0 18px;
  border-bottom: 1px solid rgba(255,255,255,0.16);
}
.eyebrow {
  margin: 0 0 8px;

  font-size: 13px;
  font-weight: bold;
  letter-spacing: 1px;

}
#msgs {

  color: #ffffff;

  line-height: 1.15;
}
.subline {
  margin: 9px 0 0;
  color: #bcc9da;
  font-size: 15px;
}
.panel {
  margin-top: 22px;
  padding: 18px;
  background: rgba(8, 14, 24, 0.72);
  border: 1px solid rgba(255,255,255,0.14);
  border-radius: 8px;
  box-shadow: 0 18px 48px rgba(0,0,0,0.28);
}
.panel h2 {
  margin: 0 0 12px;
  color: #ffffff;
  font-size: 18px;
  font-weight: bold;
}
.primary-row,
.button-grid,
.tool-row {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}
button,
select {
  min-height: 42px;
  border: 1px solid rgba(255,255,255,0.18);
  border-radius: 7px;
  background: #21385b;
  color: #ffffff;
  font-size: 15px;
  font-weight: bold;
}
button {
  padding: 0 16px;
  cursor: pointer;
}
button:hover,
button:focus {
  background: #2d5288;
  outline: none;
}
.go {
  background: #13a57d;
  border-color: #4de2bd;
  color: #06120f;
}
.linux {
  background: #f4b844;
  border-color: #ffd981;
  color: #1e1500;
}
.danger {
  background: #6d2c4d;
}
.wide {
  flex: 1 1 280px;
}
.small {
  flex: 1 1 155px;
}
.fan {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  align-items: center;
}
.fan select {
  width: 82px;
  padding-left: 12px;
}
.note {
  color: #c8d4e5;
  font-size: 13px;

</style>
<script>
function setStatus(message){window.msgs.innerHTML=message;}
function DLProgress(e){Percent=(Math.round(e.loaded / e.total * 100));setStatus("Installing Offline Cache: " + Percent + "%");}
function DisplayCacheProgress(){setTimeout(function(){setStatus("Cache Installed Successfully");},1000);setTimeout(function(){setStatus("Now Close And Re-Open Your Browser");},3000);}window.applicationCache.addEventListener("progress",DLProgress,false);window.applicationCache.oncached=function(e){DisplayCacheProgress();};window.applicationCache.onupdateready=function(e){DisplayCacheProgress();};
</script>
<script src="exp_common.js"></script>

      <button class="small" onclick="load_dbBackup(); return false">DB Backup</button>

    </div>
  </div>

  <div class="panel">
    <h2>Fan</h2>
    <div class="fan">
      <button class="small" onclick="load_fanthresh(); return false">Set Fan Threshold</button>
      <select id="tempC"></select>
      <span>&#176;C</span>
      <span class="note">Default PS4 target is 79&#176;C.</span>
    </div>
  </div>
</div>
<script>
for(var i=40; i<=79; i++){
    var select = document.getElementById("tempC");
    var option = document.createElement("OPTION");
	select.options.add(option);
	option.text = i;
	option.value = i;
}
tempC.value=60;
</script>
